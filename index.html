<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Je t'aime gros chat d'amour ❤️</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            background-image: url('1000036740.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            font-family: Arial, sans-serif;

            text-align: center;
            overflow: hidden;
            height: 100vh;
        }

        .overlay {
            position: fixed;

            top: 0;
            left: 0;

            width: 100%;
            height: 100%;

            background: rgba(255, 182, 193, 0.35);

            z-index: -1;
        }

        .content {
            margin-top: 80px;
            padding: 20px;
        }

        h1 {
            color: white;
            font-size: 4em;

            text-shadow:
                0 0 10px #ff69b4,
                0 0 20px #ff69b4,
                0 0 30px #ff1493;
        }

        .subtitle {
            margin-top: 20px;

            color: white;
            font-size: 2em;

            text-shadow: 2px 2px 8px black;
        }

        .love-btn {

            margin-top: 40px;

            background: #ff69b4;
            border: none;

            color: white;

            font-size: 1.5em;
            padding: 20px 40px;

            border-radius: 50px;

            cursor: pointer;

            transition: 0.3s;
        }

        .love-btn:hover {

            transform: scale(1.15);

            background: #ff1493;
        }

        .heart {

            position: fixed;

            top: -50px;

            animation-name: fall;
            animation-timing-function: linear;
            animation-iteration-count: infinite;

            pointer-events: none;
        }

        @keyframes fall {

            from {
                transform: translateY(-100px);
            }

            to {
                transform: translateY(120vh);
            }
        }

        .footer {

            position: fixed;

            bottom: 20px;

            width: 100%;

            color: white;

            font-size: 1.3em;

            text-shadow: 2px 2px 10px black;
        }
    </style>

</head>

<body>

    <div class="overlay"></div>

    <div class="content">

        <h1>❤️ Je t'aime gros chat ❤️</h1>

        <div class="subtitle">
            Le plus beau chat du monde 😻
        </div>

        <button class="love-btn"
            onclick="alert('Miaou ❤️')">
            Clique ici 😺
        </button>

    </div>

    <div class="footer">
        💕❤️💕❤️💕❤️💕
    </div>

    <script>

        for (let i = 0; i < 50; i++) {

            const heart = document.createElement("div");

            heart.className = "heart";

            heart.innerHTML = "❤️";

            heart.style.left =
                Math.random() * 100 + "vw";

            heart.style.fontSize =
                (Math.random() * 25 + 20) + "px";

            heart.style.animationDuration =
                (Math.random() * 6 + 6) + "s";

            heart.style.animationDelay =
                Math.random() * 8 + "s";

            document.body.appendChild(heart);
        }

    </script>

</body>
</html>
