<!DOCTYPE html>
<html>
<head>
    <title>Je t'aime gros chat d'amour !</title>
    <meta charset="utf-8">
    <style>
        body {
            font-family: Comic Sans MS, cursive, sans-serif;
            background-color: #ffd1dc;
            text-align: center;
            margin: 0;
            padding: 20px;
            animation: sparkle 2s infinite;
        }
        @keyframes sparkle {
            0% { background-color: #ffd1dc; }
            50% { background-color: #ffb6c1; }
            100% { background-color: #ffd1dc; }
        }
        h1 {
            color: #ff1493;
            font-size: 3em;
            text-shadow: 3px 3px 0px #ff69b4;
        }
        .cat {
            font-size: 5em;
            margin: 20px;
        }
        .heart {
            color: #ff0000;
            font-size: 2em;
            animation: beat 1s infinite;
        }
        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .message {
            font-size: 2em;
            color: #8a2be2;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Je t'aime gros chat d'amour !</h1>
    <div class="cat">🐱</div>
    <div class="heart">❤️</div>
    <div class="message">Tu es le plus mignon des chats de l'univers !</div>
    <div class="cat">🐾</div>
    <div class="heart">❤️</div>
    <div class="message">Miaou d'amour pour toi !</div>
    <div class="cat">😻</div>
    <div class="heart">❤️</div>
</body>
</html>
